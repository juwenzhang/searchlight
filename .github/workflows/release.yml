name: Release npm packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.123 --locked

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Sync package versions from tag
        run: pnpm release:sync "${GITHUB_REF_NAME}"

      - name: Build WASM package
        run: pnpm build:wasm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build React hooks package
        run: pnpm build:react-hooks

      - name: Validate release versions
        run: pnpm release:check "${GITHUB_REF_NAME}"

      - name: Publish WASM package
        run: pnpm --filter @luhanxin/searchlight publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish React hooks package
        run: pnpm --filter @luhanxin/searchlight-react publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
