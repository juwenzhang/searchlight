name: Release packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.123 --locked

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Sync package versions from tag
        run: pnpm release:sync "${GITHUB_REF_NAME}"

      - name: Test Rust crate
        run: pnpm test:rust

      - name: Check WASM feature
        run: pnpm check:wasm

      - name: Verify crate package
        run: pnpm publish:crate:dry-run

      - name: Build WASM package
        run: pnpm build:wasm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck React hooks package
        run: pnpm typecheck

      - name: Build React hooks package
        run: pnpm build:react-hooks

      - name: Validate release versions
        run: pnpm release:check "${GITHUB_REF_NAME}"

      - name: Publish Rust crate
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if curl -fsSL "https://crates.io/api/v1/crates/luhanxin-searchlight/${VERSION}" >/dev/null; then
            echo "luhanxin-searchlight ${VERSION} already exists on crates.io, skipping"
          else
            cargo publish --allow-dirty --token "${CRATES_IO_TOKEN}"
          fi
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish WASM package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "@luhanxin/searchlight@${VERSION}" version >/dev/null 2>&1; then
            echo "@luhanxin/searchlight ${VERSION} already exists on npm, skipping"
          else
            pnpm --filter @luhanxin/searchlight publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish React hooks package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "@luhanxin/searchlight-react@${VERSION}" version >/dev/null 2>&1; then
            echo "@luhanxin/searchlight-react ${VERSION} already exists on npm, skipping"
          else
            pnpm --filter @luhanxin/searchlight-react publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
